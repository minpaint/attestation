{% extends "base.html" %}

{% block title %}{{ page.meta_title|default:page.title }}{% endblock %}
{% block description %}{{ page.meta_description }}{% endblock %}

{% block content %}
{% if admin_edit_url %}
<div style="position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;gap:8px;">
  <a href="{{ admin_edit_url }}"
     style="display:inline-flex;align-items:center;gap:7px;background:#16285a;color:#fff;
            padding:11px 18px;border-radius:10px;font:700 13px/1 'Manrope',sans-serif;
            text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,.25);">
    <svg width="15" height="15" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14.7 2.3a1 1 0 0 1 1.4 0l1.6 1.6a1 1 0 0 1 0 1.4L5.5 17.5 2 18l.5-3.5L14.7 2.3z"
            stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Редактировать
  </a>
  <a href="/admin/" target="_blank"
     style="display:inline-flex;align-items:center;background:#ff6a13;color:#fff;
            padding:11px 14px;border-radius:10px;font:700 13px/1 'Manrope',sans-serif;
            text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,.25);">
    Admin
  </a>
</div>
{% endif %}
<div style="font-family:'Manrope',sans-serif;background:#fff;max-width:1280px;margin:0 auto;box-shadow:0 0 60px rgba(12,23,51,.08);">
  {{ page.content|safe }}
</div>
{% endblock %}
